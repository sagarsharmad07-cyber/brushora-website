<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRUSHORA - Studio & Store</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Playfair Display', Georgia, serif; scroll-behavior: smooth; }
    body { background-color: #fbf6f0; color: #2c2923; padding: 40px 20px; }
    header { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 60px auto; border-bottom: 1px solid #e6dfd5; padding-bottom: 20px; }
    .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
    nav a { margin: 0 12px; text-decoration: none; color: #2c2923; font-size: 14px; font-family: sans-serif; transition: color 0.2s; }
    nav a:hover { color: #b45f38; }
    .email-icon { background: #1a1a1a; color: white; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; text-decoration: none; }
    
    .hero { display: flex; max-width: 1200px; margin: 0 auto 80px auto; gap: 40px; align-items: center; }
    .hero-text { flex: 1; }
    .tagline { display: inline-block; padding: 6px 12px; border: 1px solid #d4cbbd; border-radius: 20px; font-size: 12px; margin-bottom: 20px; background: #fff; color: #b45f38; font-family: sans-serif; }
    .hero h1 { font-size: 64px; line-height: 1.1; margin-bottom: 20px; font-weight: normal; }
    .hero p { font-size: 16px; font-family: sans-serif; line-height: 1.6; color: #5a554a; max-width: 450px; }
    .hero-img { flex: 1; text-align: right; position: relative; }
    .hero-img img { width: 100%; max-width: 500px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .featured-badge { position: absolute; bottom: 20px; left: 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); padding: 15px 20px; border-radius: 6px; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    
    .stats-grid { display: flex; max-width: 1200px; margin: 0 auto 80px auto; gap: 20px; }
    .stat-card { flex: 1; background: #fffdfa; border: 1px solid #e9e2d8; padding: 25px; border-radius: 4px; display: flex; align-items: center; gap: 15px; }
    .stat-icon { width: 40px; height: 40px; border-radius: 50%; background: #285560; color: white; display: flex; align-items: center; justify-content: center; }
    .stat-info span { font-size: 11px; text-transform: uppercase; font-family: sans-serif; color: #8a8273; }
