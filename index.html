<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    
    #bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      /* Agar .png kaam na kare toh yahan .jpg karke try karna */
      background: url('baground.png') center/cover;
      filter: brightness(0.5); z-index: 1;
    }
    
    #ui { position: relative; z-index: 2; text-align: center; color: white; }
    button { padding: 15px 30px; background: transparent; border: 1px solid white; color: white; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; }
  </style>
</head>
<body>

  <div id="bg"></div>

  <div id="ui">
    <h1>BRUSHORA</h1>
    <button onclick="playMusic()">Enter Gallery</button>
  </div>

  <audio id="audio" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    function playMusic() {
      const audio = document.getElementById("audio");
      audio.play();
      document.getElementById("ui").style.display = "none";
    }
  </script>
</body>
</html>
