<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
    
    #intro-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      /* Naya Background Image Source */
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                  url('https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=1600');
      background-size: cover; background-position: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 999;
    }
    
    .btn { padding: 15px 40px; border: 1px solid #fff; background: transparent; color: #fff; cursor: pointer; text-transform: uppercase; letter-spacing: 4px; }
  </style>
</head>
<body>

  <div id="intro-screen">
    <h1 style="color: #fff; letter-spacing: 10px;">BRUSHORA</h1>
    <button class="btn" onclick="start()">ENTER GALLERY</button>
  </div>

  <audio id="audio" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    function start() {
      const audio = document.getElementById("audio");
      audio.currentTime = 0;
      audio.play();
      document.getElementById('intro-screen').style.display = 'none';
    }
  </script>
</body>
</html>
