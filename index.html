<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    
    #bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      /* Ab direct file ka naam */
      background: url('baground.png') center/cover no-repeat;
      filter: brightness(0.5); z-index: 1;
    }
    
    #ui { position: relative; z-index: 2; text-align: center; color: white; }
    button { padding: 15px 30px; background: transparent; border: 1px solid white; color: white; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; }
  </style>
</head>
<body>

  <div id="bg"></div>

  <div id="ui">
    <h1>BRUSHORA</h1>
    <button onclick="document.getElementById('audio').play(); this.parentElement.style.display='none';">Enter Gallery</button>
  </div>

  <audio id="audio" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>
</body>
</html>
