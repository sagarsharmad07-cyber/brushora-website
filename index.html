<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    /* Premium Background with subtle grain & glow */
    #intro-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #2c2923 0%, #1a1916 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 2000; transition: opacity 1.5s ease;
    }
    
    /* Luxury Button Design */
    .enter-btn {
      padding: 18px 50px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #e9e2d8;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(10px); /* Glass effect */
      transition: all 0.4s ease;
    }
    .enter-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.5);
      transform: scale(1.05);
    }
    
    h1 { color: #e9e2d8; font-weight: 200; letter-spacing: 8px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div id="intro-screen">
    <h1>BRUSHORA</h1>
    <button class="enter-btn" onclick="enterGallery()">Enter Gallery</button>
  </div>
  </body>
</html>
