<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRUSHORA | Studio & Archive</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #faf9f6; color: #1a1a1a; font-family: 'Inter', sans-serif; padding: 60px 40px; }
    header { max-width: 1100px; margin: 0 auto 100px auto; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: 'Playfair Display', serif; font-size: 28px; letter-spacing: 4px; text-transform: uppercase; }
    .products-grid { max-width: 1100px; margin: 0 auto 100px auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 60px; }
    .product-card { display: flex; flex-direction: column; cursor: pointer; }
    .img-wrap { overflow: hidden; margin-bottom: 20px; }
    .product-img { width: 100%; height: 450px; object-fit: cover; filter: sepia(15%) contrast(1.05); }
    h3 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; margin-bottom: 8px; }
    .price { font-size: 14px; color: #888; margin-bottom: 20px; font-family: sans-serif; }
    .order-btn { background: transparent; border: 1px solid #1a1a1a; padding: 12px 0; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; transition: all 0.3s; cursor: pointer; width: 100%; }
    .order-btn:hover { background: #1a1a1a; color: #fff; }
    .form-section { max-width: 600px; margin: 0 auto; padding: 40px; background: #fff; border: 1px solid #eee; }
    input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; font-family: sans-serif; }
    button[type="submit"] { background: #1a1a1a; color: #fff; padding: 15px; width: 100%; border: none; cursor: pointer; font-family: sans-serif; }
    @media (max-width: 900px) { .products-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="logo">BRUSHORA</div>
    <div style="font-size: 12px; letter-spacing: 1px;">STUDIO ARCHIVE</div>
  </header>
  <div class="products-grid">
    <div class="product-card" onclick="order('Quiet Gaze', '₹1,499')">
      <div class="img-wrap"><img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=800" class="product-img"></div>
      <h3>Quiet Gaze</h3>
      <div class="price">Charcoal & Acrylic</div>
      <button class="order-btn">Inquire for Purchase</button>
    </div>
    <div class="product-card" onclick="order('Market Afternoon', '₹1,299')">
      <div class="img-wrap"><img src="https://images.unsplash.com/photo-1579783928621-7a13d66a6211?w=800" class="product-img"></div>
      <h3>Market Afternoon</h3>
      <div class="price">Ink and Gouache</div>
      <button class="order-btn">Inquire for Purchase</button>
    </div>
    <div class="product-card" onclick="order('Hands In Light', '₹1,199')">
      <div class="img-wrap"><img src="https://images.unsplash.com/photo-1580136579312-94651dfd596d?w=800" class="product-img"></div>
      <h3>Hands In Light</h3>
      <div class="price">Graphite Study</div>
      <button class="order-btn">Inquire for Purchase</button>
    </div>
  </div>
  <div class="form-section">
    <h2 style="margin-bottom:20px; font-family: 'Playfair Display', serif;">Contact / Custom Order</h2>
    <form action="https://formspree.io/f/xqeraqjy" method="POST">
      <input type="text" name="name" placeholder="Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <textarea name="message" placeholder="Details about your order..." required></textarea>
      <button type="submit">SEND ORDER</button>
    </form>
  </div>
  <script>
    function order(name, price) {
      window.open(`https://wa.me/917568035595?text=Hello Brushora! I want to inquire about: *${name}* (${price}).`, '_blank');
    }
  </script>
</body>
</html>
