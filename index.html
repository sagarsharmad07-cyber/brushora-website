<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUSHORA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: #000; overflow: hidden; font-family: sans-serif; 
        }

        /* Background Layer */
        #bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('baground.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.5);
            z-index: 1;
        }

        /* UI Layer */
        #ui { position: relative; z-index: 2; text-align: center; color: white; }
        h1 { margin-bottom: 20px; letter-spacing: 5px; }
        button { 
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            background: transparent; color: white; border: 2px solid white;
            transition: 0.3s; text-transform: uppercase;
        }
        button:hover { background: white; color: black; }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div id="ui">
        <h1>BRUSHORA</h1>
        <button id="startBtn">Enter Gallery</button>
    </div>

    <audio id="audio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('startBtn');
        const audio = document.getElementById('audio');
        const ui = document.getElementById('ui');

        btn.addEventListener('click', () => {
            audio.play().then(() => {
                ui.style.display = 'none';
            }).catch(err => {
                alert("Click to start music!");
            });
        });
    </script>
</body>
<!-- BRUSHORA V2 HERO SECTION -->
<div id="v2-hero-section" style="width: 100%; height: 100vh; background-color: #f4eee8; display: flex; align-items: center; justify-content: space-between; padding: 0 10%; box-sizing: border-box; font-family: 'Inter', sans-serif;">

    <div style="flex: 1; height: 70vh; background: #dcdcdc; position: relative;">
        <!-- Floating Card -->

    </div>
</div>

<style>
    /* Global Reset & Fonts */
    .v2-wrapper { font-family: 'Inter', sans-serif; background: #f4eee8; color: #1a1a1a; }
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap');

    /* 1. Navbar: Transparent at top, blur on scroll */
    .v2-nav { position: fixed; top: 0; width: 100%; padding: 20px 10%; display: flex; justify-content: space-between; z-index: 1000; transition: 0.3s; backdrop-filter: blur(10px); }

    /* 2. Hero Section: Split layout with floating card */
    .v2-hero { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; align-items: center; padding: 0 10%; }
    .v2-hero-title { font-family: 'Cormorant Garamond', serif; font-size: 5rem; }
    .v2-floating-card { background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); padding: 20px; width: 250px; position: absolute; bottom: 50px; left: -50px; }

    /* 3. Masonry Layout: Shop the Wall */
    .v2-gallery { column-count: 3; column-gap: 20px; padding: 50px 10%; }
    .v2-art-item { break-inside: avoid; margin-bottom: 20px; overflow: hidden; position: relative; }
    .v2-art-item img { width: 100%; transition: 0.5s; }
    .v2-art-item:hover img { transform: scale(1.05); }

    /* 4. WhatsApp Pulse Animation */
    .v2-wa-float { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #25d366; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); } }
</style>

<div class="v2-wrapper">

</script>
