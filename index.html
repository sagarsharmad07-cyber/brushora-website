<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; }
    
    /* Background Image with Dark Overlay */
    #intro-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                  url('https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=2000');
      background-size: cover;
      background-position: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 2000; transition: opacity 1.5s ease;
    }
    
    .enter-btn {
      padding: 18px 50px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid #fff;
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(10px);
      text-transform: uppercase;
      letter-spacing: 4px;
      transition: 0.4s;
    }
    .enter-btn:hover { background: #fff; color: #000; }
    
    .music-btn {
      position: fixed; bottom: 30px; right: 30px; z-index: 3000;
      background: none; border: 1px solid #fff; color: #fff;
      padding: 10px 20px; cursor: pointer; font-size: 10px;
    }
  </style>
</head>
<body>

  <button class="music-btn" onclick="toggleMusic()">🔊 Music Toggle</button>
  
  <div id="intro-screen">
    <h1 style="color: #fff; letter-spacing: 10px;">BRUSHORA</h1>
    <button class="enter-btn" onclick="enterGallery()">Enter Gallery</button>
  </div>

  <audio id="bg-music" loop>
    <source src="Running_Up_That_Hill_A_Deal_With_God.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById("bg-music");
    function enterGallery() {
      music.play();
      document.getElementById('intro-screen').style.opacity = '0';
      setTimeout(() => { document.getElementById('intro-screen').style.display = 'none'; }, 1500);
    }
    function toggleMusic() {
      music.paused ? music.play() : music.pause();
    }
  </script>
</body>
</html>
