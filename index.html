<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUSHORA | Artistry Reimagined</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #f4efe6; margin: 0; font-family: 'Manrope', sans-serif; color: #2c2923; }
        
        /* Hero Section - Same as original */
        .hero { min-height: 92vh; display: flex; flex-direction: column; justify-content: center; padding: 0 10%; position: relative; }
        h1 { font-family: 'Fraunces', serif; font-size: clamp(4rem, 14vw, 12rem); margin: 0; line-height: 0.78; }
        
        /* WhatsApp Floating Button */
        .wa-float { 
            position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; 
            padding: 15px 25px; border-radius: 50px; cursor: pointer; z-index: 999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-weight: 600; display: flex; align-items: center; gap: 10px;
        }

        /* Form Styling - Minimalist */
        .form-section { max-width: 600px; padding: 50px 10%; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #2c292329; border-radius: 8px; background: #f4efe6; }
        button { background: #2c2923; color: white; padding: 15px 30px; border: none; cursor: pointer; border-radius: 8px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>BRUSHORA</h1>
        <p>Artistry Reimagined</p>
    </section>

    <section class="form-section" id="commissions">
        <h2>Custom Order</h2>
        <form action="https://formspree.io/f/xqeraqjy" method="POST" id="orderForm">
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="artwork" placeholder="Artwork Type">
            <input type="number" name="budget" placeholder="Budget">
            <textarea name="message" rows="4" placeholder="Message"></textarea>
            <button type="submit" id="submitBtn">Give Your Order</button>
        </form>
        <div id="successMsg" style="display:none; text-align:center; padding:40px; background:#e8f5e9; border-radius:8px;">
            <h3>Order Sent Successfully!</h3>
            <p>Thank you. We will contact you soon.</p>
        </div>
    </section>

    <div class="wa-float" onclick="window.open('https://wa.me/917568035595')">
        <span>💬</span> Chat on WhatsApp
    </div>

    <script>
        const form = document.getElementById('orderForm');
        const successMsg = document.getElementById('successMsg');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Sending...";
            const response = await fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            });
            if (response.ok) {
                form.style.display = 'none';
                successMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
