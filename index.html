<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUSHORA | Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=Manrope:wght@300;600&display=swap');
        body { background: #f4efe6; margin: 0; font-family: 'Manrope', sans-serif; color: #2c2923; }
        .section-padding { padding: 80px 10%; }
        
        /* Hero */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        h1 { font-family: 'Fraunces', serif; font-size: 5rem; }

        /* Gallery Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .art-card { border: 1px solid #dcdcdc; padding: 20px; transition: 0.3s; }
        .art-card:hover { transform: translateY(-10px); box-shadow: 0 20px 30px rgba(0,0,0,0.1); }

        /* Form Styling */
        .contact-form { display: grid; gap: 15px; max-width: 600px; margin: auto; }
        input, textarea { padding: 15px; border: 1px solid #dcdcdc; border-radius: 8px; }
        
        /* WhatsApp Floating */
        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; padding: 15px 25px; border-radius: 50px; z-index: 999; cursor: pointer; }
    </style>
</head>
<body>

    <section class="hero">
        <div>
            <h1>BRUSHORA</h1>
            <p>Artistry Reimagined</p>
        </div>
    </section>

    <section id="gallery" class="section-padding">
        <h2 style="font-family: 'Fraunces', serif; font-size: 3rem; text-align: center;">Collection</h2>
        <div class="grid">
            <div class="art-card">
                <h3>Quiet Gaze</h3>
                <p>Charcoal | ₹1499</p>
            </div>
            </div>
    </section>

    <section class="section-padding">
        <h2 style="text-align:center;">Commission Request</h2>
        <form action="https://formspree.io/f/xqeraqjy" method="POST" id="orderForm" class="contact-form">
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="artwork" placeholder="Artwork Type">
            <input type="number" name="budget" placeholder="Budget">
            <textarea name="message" placeholder="Message"></textarea>
            <button type="submit" id="submitBtn" style="padding:15px; cursor:pointer;">Give Your Order</button>
        </form>
        <div id="successMsg" style="display:none; text-align:center; padding:40px;">
            <h2>Order Sent Successfully!</h2>
            <p>Thank you. We will contact you soon.</p>
        </div>
    </section>

    <div class="wa-float" onclick="window.open('https://wa.me/917568035595')">Chat on WhatsApp 💬</div>

    <script>
        const form = document.getElementById('orderForm');
        const successMsg = document.getElementById('successMsg');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const response = await fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            });
            if (response.ok) {
                form.style.display = 'none';
                successMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
