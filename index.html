<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUSHORA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: #000; overflow: hidden; font-family: sans-serif; 
        }

        /* Background Layer */
        #bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('baground.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.5);
            z-index: 1;
        }

        /* UI Layer */
        #ui { position: relative; z-index: 2; text-align: center; color: white; }
        h1 { margin-bottom: 20px; letter-spacing: 5px; }
        button { 
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            background: transparent; color: white; border: 2px solid white;
            transition: 0.3s; text-transform: uppercase;
        }
        button:hover { background: white; color: black; }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div id="ui">
        <h1>BRUSHORA</h1>
        <button id="startBtn">Enter Gallery</button>
    </div>

    <audio id="audio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('startBtn');
        const audio = document.getElementById('audio');
        const ui = document.getElementById('ui');

        btn.addEventListener('click', () => {
            audio.play().then(() => {
                ui.style.display = 'none';
            }).catch(err => {
                alert("Click to start music!");
            });
        });
    </script>
</body>
</html>
