<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body, html { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; font-family: sans-serif; }
    
    #bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      /* Yahan assets folder ka sahi path hai */
      background: url('assets/baground.png') center/cover no-repeat;
      filter: brightness(0.5); z-index: 1;
    }
    
    #ui { position: relative; z-index: 2; text-align: center; color: white; }
    
    button { 
      padding: 15px 30px; background: transparent; border: 1px solid white; 
      color: white; cursor: pointer; text-transform: uppercase; 
      letter-spacing: 3px; transition: 0.3s;
    }
    button:hover { background: white; color: black; }
  </style>
</head>
<body>

  <div id="bg"></div>

  <div id="ui">
    <h1 style="letter-spacing: 10px;">BRUSHORA</h1>
    <button onclick="startExperience()">Enter Gallery</button>
  </div>

  <audio id="audio" loop>
    <source src="assets/music.mp3" type="audio/mpeg">
  </audio>

  <script>
    function startExperience() {
      const audio = document.getElementById("audio");
      audio.play();
      document.getElementById("ui").style.display = "none";
    }
  </script>
</body>
</html>
